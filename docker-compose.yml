# Инфраструктура для локальной разработки: Postgres + MinIO.
# Запуск: docker compose up -d
# Остановка: docker compose down
# Данные сохраняются в именованных volumes.

services:
  postgres:
    image: postgres:16-alpine
    container_name: giras-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: giras
    volumes:
      - giras_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d giras"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: giras-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - giras_minio_data:/data

volumes:
  giras_postgres_data:
  giras_minio_data:
